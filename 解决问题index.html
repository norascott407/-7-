<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解决问题实操系统 · KSME七步法</title>
<style>
:root{
  --bg:#0f1117;--sf:#1a1d27;--cd:#1f2235;--bd:#2a2f45;
  --ac:#6c63ff;--ac2:#ff6584;--gd:#f5c542;--gn:#43d9a2;
  --bl:#4fc3f7;--or:#ff9a3c;--pk:#e879f9;--tx:#e2e8f0;--mt:#8892a4;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;line-height:1.7;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a1d27,#12152e);border-bottom:1px solid var(--bd);padding:24px 20px 20px;text-align:center}
.hdr h1{font-size:clamp(18px,4vw,28px);font-weight:800;background:linear-gradient(90deg,#6c63ff,#4fc3f7,#43d9a2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr .sub{color:var(--mt);font-size:13px;margin-top:4px}

/* LAYOUT */
.app{max-width:1200px;margin:0 auto;padding:20px}

/* DASHBOARD */
.dash-empty{text-align:center;padding:80px 20px;color:var(--mt)}
.dash-empty .big{font-size:48px;margin-bottom:16px}
.dash-empty p{font-size:15px;margin-bottom:24px}
.btn-new{background:linear-gradient(135deg,#6c63ff,#4fc3f7);color:#fff;border-radius:30px;padding:12px 32px;font-size:15px;font-weight:600;transition:all .25s;box-shadow:0 4px 20px rgba(108,99,255,.3)}
.btn-new:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(108,99,255,.4)}
.problem-list{display:flex;flex-direction:column;gap:12px}
.problem-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.problem-card:hover{border-color:rgba(108,99,255,.4);transform:translateX(4px)}
.problem-card .info{flex:1}
.problem-card .title{font-size:16px;font-weight:700;margin-bottom:4px}
.problem-card .meta{font-size:12px;color:var(--mt)}
.problem-card .meta span{margin-right:16px}
.problem-card .actions{display:flex;gap:8px}
.btn-sm{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--ac);color:#fff}.btn-primary:hover{background:#5b52ee}
.btn-outline{background:transparent;border:1px solid var(--bd);color:var(--mt)}.btn-outline:hover{border-color:var(--ac);color:var(--ac)}
.btn-danger{background:transparent;border:1px solid rgba(255,101,132,.3);color:var(--ac2)}.btn-danger:hover{background:rgba(255,101,132,.1)}
.btn-archived{background:rgba(67,217,162,.1);border:1px solid rgba(67,217,162,.3);color:var(--gn)}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);margin-bottom:20px;gap:12px;flex-wrap:wrap}
.topbar .left{display:flex;align-items:center;gap:12px}
.topbar .back-btn{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;color:var(--mt);font-size:13px;transition:all .2s}
.topbar .back-btn:hover{border-color:var(--ac);color:var(--ac)}
.topbar .prob-title{font-size:18px;font-weight:700}
.topbar .right{display:flex;gap:8px}

/* STEP NAV */
.step-nav{display:flex;gap:0;overflow-x:auto;padding-bottom:8px;margin-bottom:24px;border-bottom:1px solid var(--bd)}
.step-tab{padding:10px 14px;font-size:12px;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;position:relative}
.step-tab:hover{color:var(--tx)}
.step-tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.step-tab.done::after{content:'✓';position:absolute;top:4px;right:4px;font-size:10px;color:var(--gn)}
.step-tab .num{font-weight:700;margin-right:4px}

/* PROGRESS */
.progress-bar{height:4px;background:var(--bd);border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--bl));border-radius:2px;transition:width .4s}

/* STEP INTRO */
.step-intro{background:linear-gradient(135deg,rgba(108,99,255,.08),rgba(79,195,247,.06));border:1px solid rgba(108,99,255,.2);border-radius:var(--r);padding:20px 24px;margin-bottom:24px}
.step-intro h3{font-size:16px;margin-bottom:8px}
.step-intro p{font-size:14px;color:var(--mt);line-height:1.8}
.step-intro .why{color:#a78bfa;font-weight:600}

/* TOOL CARD */
.tool{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.tool-hdr{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .2s}
.tool-hdr:hover{background:rgba(108,99,255,.05)}
.tool-hdr .left{display:flex;align-items:center;gap:10px}
.tool-hdr .emoji{font-size:20px}
.tool-hdr .name{font-size:15px;font-weight:700}
.tool-hdr .tag{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(108,99,255,.12);color:#a78bfa;margin-left:8px}
.tool-hdr .toggle{color:var(--mt);font-size:18px;transition:transform .3s}
.tool.collapsed .tool-hdr .toggle{transform:rotate(-90deg)}
.tool.collapsed .tool-body{display:none}
.tool-body{padding:20px}
.tool-desc{font-size:13px;color:var(--mt);margin-bottom:16px;line-height:1.8}
.tool-desc strong{color:var(--tx)}

/* HOW-TO */
.howto{background:rgba(67,217,162,.06);border:1px solid rgba(67,217,162,.15);border-radius:10px;padding:14px 18px;margin-bottom:16px}
.howto .ht-title{font-size:12px;color:var(--gn);font-weight:700;margin-bottom:8px;letter-spacing:1px}
.howto ol{padding-left:18px;font-size:13px;color:var(--mt);line-height:2}
.howto li strong{color:var(--tx)}

/* INPUT AREAS */
.field-group{margin-bottom:14px}
.field-label{font-size:12px;color:var(--mt);margin-bottom:6px;font-weight:600}
.field-input{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;color:var(--tx);font-size:14px;transition:border-color .2s}
.field-input:focus{border-color:var(--ac)}
textarea.field-input{min-height:80px;resize:vertical}
.field-row{display:flex;gap:8px}
.field-row .field-input{flex:1}
.btn-add{background:var(--ac);color:#fff;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;white-space:nowrap}
.btn-add:hover{background:#5b52ee}

/* LIST ITEMS */
.item-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.item{display:flex;align-items:center;gap:8px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:13px}
.item .text{flex:1;color:var(--tx)}
.item .del{color:var(--mt);cursor:pointer;font-size:16px;padding:0 4px;transition:color .2s}
.item .del:hover{color:var(--ac2)}

/* CONNECTOR */
.connector{text-align:center;padding:10px 0;color:var(--mt);font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0}
.connector-arr{color:var(--ac)}

/* ===================== STEP 1 INTEGRATED PIPELINE ===================== */
.pipeline{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.pipe-header{padding:16px 20px;background:linear-gradient(135deg,rgba(108,99,255,.08),rgba(79,195,247,.04));border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.pipe-header h4{font-size:15px;display:flex;align-items:center;gap:8px}
.pipe-stages{display:flex;gap:0;border-bottom:1px solid var(--bd)}
.pipe-stage{flex:1;padding:12px 16px;text-align:center;font-size:12px;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;position:relative}
.pipe-stage:hover{color:var(--tx);background:rgba(108,99,255,.03)}
.pipe-stage.active{color:var(--ac);border-bottom-color:var(--ac);background:rgba(108,99,255,.05)}
.pipe-stage .ps-num{display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--bd);color:var(--tx);font-size:11px;font-weight:700;line-height:20px;margin-right:6px}
.pipe-stage.active .ps-num{background:var(--ac)}
.pipe-stage.done .ps-num{background:var(--gn)}
.pipe-body{padding:20px;min-height:200px}

/* PIPE STAGE 1: Problem List */
.pl-input-row{display:flex;gap:8px;margin-bottom:16px}
.pl-input-row input{flex:1}
.pl-input-row .btn-add{min-width:80px}
.pl-list{display:flex;flex-direction:column;gap:6px}
.pl-item{display:flex;align-items:center;gap:8px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;transition:all .2s}
.pl-item:hover{border-color:rgba(108,99,255,.3)}
.pl-item .pl-text{flex:1;font-size:14px}
.pl-item .pl-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.pl-item .pl-badge.b-unclassified{background:rgba(136,146,164,.12);color:var(--mt)}
.pl-item .pl-badge.b-q1{background:rgba(67,217,162,.12);color:var(--gn)}
.pl-item .pl-badge.b-q2{background:rgba(255,154,60,.12);color:var(--or)}
.pl-item .pl-badge.b-q3{background:rgba(79,195,247,.12);color:var(--bl)}
.pl-item .pl-badge.b-q4{background:rgba(136,146,164,.12);color:var(--mt)}
.pl-item .pl-del{cursor:pointer;color:var(--mt);font-size:14px;padding:0 4px}.pl-item .pl-del:hover{color:var(--ac2)}
.pl-count{font-size:12px;color:var(--mt);margin-top:12px;text-align:right}

/* PIPE STAGE 2: Quadrant */
.quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.quad-cell{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;min-height:120px}
.quad-cell .q-label{font-size:12px;font-weight:700;margin-bottom:4px;letter-spacing:1px}
.quad-cell .q-sub{font-size:10px;color:var(--mt);margin-bottom:8px}
.quad-cell.q1{border-color:rgba(67,217,162,.25)}.quad-cell.q1 .q-label{color:var(--gn)}
.quad-cell.q2{border-color:rgba(255,154,60,.25)}.quad-cell.q2 .q-label{color:var(--or)}
.quad-cell.q3{border-color:rgba(79,195,247,.25)}.quad-cell.q3 .q-label{color:var(--bl)}
.quad-cell.q4{border-color:rgba(136,146,164,.15)}.quad-cell.q4 .q-label{color:var(--mt)}
.q-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border-radius:6px;margin-bottom:4px;cursor:pointer;transition:all .15s}
.q-item:hover{filter:brightness(1.2)}
.q-item .qi-text{flex:1}
.q-item .qi-arr{font-size:10px;color:var(--mt);cursor:pointer;padding:2px}.q-item .qi-arr:hover{color:var(--ac)}
.q-item .qi-del{font-size:10px;color:var(--mt);cursor:pointer;padding:2px}.q-item .qi-del:hover{color:var(--ac2)}
.q1 .q-item{background:rgba(67,217,162,.08)}.q2 .q-item{background:rgba(255,154,60,.08)}
.q3 .q-item{background:rgba(79,195,247,.08)}.q4 .q-item{background:rgba(136,146,164,.06)}
.q-item.king-item{border:1px solid var(--gd);background:rgba(245,197,66,.1);font-weight:600}
.q-item.king-item::before{content:'👑';margin-right:2px}
.unclassified-bank{margin-top:12px;padding:12px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}
.unclassified-bank .ub-title{font-size:12px;color:var(--mt);margin-bottom:8px;font-weight:600}
.unclassified-bank .ub-hint{font-size:11px;color:var(--mt);margin-bottom:8px}

/* PIPE STAGE 3: Connections */
.conn-workspace{display:flex;gap:16px;flex-wrap:wrap}
@media(max-width:600px){.conn-workspace{flex-direction:column}}
.conn-problems{flex:1;min-width:200px}
.conn-problems .cp-title{font-size:12px;color:var(--mt);margin-bottom:8px;font-weight:600}
.conn-item{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;margin-bottom:4px;cursor:pointer;transition:all .15s}
.conn-item:hover{border-color:var(--ac)}
.conn-item.selected{border-color:var(--ac);background:rgba(108,99,255,.1)}
.conn-item .ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-item .ci-text{flex:1}
.conn-item .ci-conn-count{font-size:10px;color:var(--ac);font-weight:600}
.conn-builder{flex:1;min-width:240px}
.conn-builder .cb-title{font-size:12px;color:var(--mt);margin-bottom:8px;font-weight:600}
.conn-builder .cb-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.conn-builder .cb-from,.conn-builder .cb-to{flex:1;padding:6px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;font-size:12px;color:var(--tx);min-height:32px;display:flex;align-items:center}
.conn-builder .cb-arrow{color:var(--ac);font-size:16px;flex-shrink:0}
.conn-link{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 10px;background:rgba(108,99,255,.06);border-radius:6px;margin-bottom:4px}
.conn-link .cl-from{color:var(--ac2)}.conn-link .cl-to{color:var(--gn)}.conn-link .cl-del{cursor:pointer;color:var(--mt);margin-left:auto}.conn-link .cl-del:hover{color:var(--ac2)}
.conn-stats{margin-top:12px;padding:12px;background:rgba(108,99,255,.06);border:1px solid rgba(108,99,255,.15);border-radius:8px;font-size:13px}
.conn-stats .cs-item{display:flex;justify-content:space-between;padding:2px 0}
.conn-stats .cs-hot{color:var(--gd);font-weight:700}

/* PIPE STAGE 4: King Problem */
.king-selection{margin-top:12px}
.king-candidates{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.king-cand{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;cursor:pointer;transition:all .2s}
.king-cand:hover{border-color:rgba(245,197,66,.4);background:rgba(245,197,66,.04)}
.king-cand.is-king{border-color:var(--gd);background:rgba(245,197,66,.08);box-shadow:0 0 16px rgba(245,197,66,.1)}
.king-cand .kc-icon{font-size:20px}.king-cand .kc-text{flex:1;font-size:14px}
.king-cand .kc-conn{font-size:11px;color:var(--ac)}
.king-cand .kc-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(245,197,66,.15);color:var(--gd);font-weight:600}
.other-problems{margin-top:20px;padding:16px;background:rgba(79,195,247,.04);border:1px solid rgba(79,195,247,.15);border-radius:10px}
.other-problems .op-title{font-size:13px;font-weight:700;color:var(--bl);margin-bottom:8px}
.other-problems .op-hint{font-size:11px;color:var(--mt);margin-bottom:10px}
.other-problems .op-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;font-size:13px}
.other-problems .op-item .op-text{flex:1}
.other-problems .op-item .op-promote{font-size:11px;color:var(--ac);cursor:pointer;white-space:nowrap}.other-problems .op-item .op-promote:hover{text-decoration:underline}

/* SH CARD */
.sh-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:8px}
.sh-card .sh-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sh-card .sh-name{font-size:14px;font-weight:700}
.sh-card .sh-role{font-size:11px;padding:2px 8px;border-radius:10px}
.sh-card .sh-del{cursor:pointer;color:var(--mt);font-size:12px}.sh-card .sh-del:hover{color:var(--ac2)}
.sh-card textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:6px;padding:8px;color:var(--tx);font-size:12px;min-height:40px;resize:vertical}
.role-owner{background:rgba(255,101,132,.12);color:var(--ac2)}.role-partner{background:rgba(108,99,255,.12);color:#a78bfa}
.role-adviser{background:rgba(79,195,247,.12);color:var(--bl)}.role-supporter{background:rgba(67,217,162,.12);color:var(--gn)}
.role-outsider{background:rgba(136,146,164,.12);color:var(--mt)}

/* FVO */
.fvo-container{display:flex;gap:12px;margin-top:10px}
@media(max-width:600px){.fvo-container{flex-direction:column}}
.fvo-col{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px}
.fvo-col .fvo-title{font-size:13px;font-weight:700;margin-bottom:8px}
.fvo-col.fact .fvo-title{color:var(--gn)}.fvo-col.opinion .fvo-title{color:var(--or)}

/* MECE */
.mece-branch{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px}
.mece-branch .mb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mece-branch .mb-name{font-size:14px;font-weight:700;color:var(--bl)}
.mece-branch .mb-del{cursor:pointer;color:var(--mt);font-size:12px}.mece-branch .mb-del:hover{color:var(--ac2)}
.mece-branch .mb-items{display:flex;flex-direction:column;gap:4px}
.mece-branch .mb-item{font-size:12px;padding:4px 8px;background:rgba(79,195,247,.06);border-radius:4px;display:flex;justify-content:space-between}
.mece-branch .mb-item .mi-del{cursor:pointer;color:var(--mt);font-size:10px}.mece-branch .mb-item .mi-del:hover{color:var(--ac2)}
.mece-add-row{display:flex;gap:6px;margin-top:6px}
.mece-add-row input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:4px;padding:4px 8px;color:var(--tx);font-size:11px}

/* SMART */
.smart-grid{display:flex;flex-direction:column;gap:10px}
.smart-row{display:flex;gap:12px;align-items:flex-start}
.smart-letter{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;margin-top:4px}
.sl-s{background:rgba(108,99,255,.15);color:var(--ac)}.sl-m{background:rgba(79,195,247,.15);color:var(--bl)}
.sl-a{background:rgba(67,217,162,.15);color:var(--gn)}.sl-r{background:rgba(255,154,60,.15);color:var(--or)}
.sl-t{background:rgba(232,121,249,.15);color:var(--pk)}
.smart-detail{flex:1}
.smart-detail .sl-title{font-size:13px;font-weight:700;margin-bottom:2px}
.smart-detail .sl-hint{font-size:11px;color:var(--mt);margin-bottom:6px}
.smart-detail textarea{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:13px;min-height:50px;resize:vertical}

/* KSME */
.ksme-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.ksme-grid{grid-template-columns:1fr}}
.ksme-dim{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px}
.ksme-dim .kd-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ksme-dim .kd-name{font-size:14px;font-weight:700}
.ksme-dim .kd-hint{font-size:11px;color:var(--mt);margin-bottom:8px}
.ksme-dim textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:6px;padding:8px;color:var(--tx);font-size:12px;min-height:60px;resize:vertical}

/* 6 HATS */
.hats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
@media(max-width:500px){.hats-grid{grid-template-columns:1fr 1fr}}
.hat-card{border-radius:8px;padding:10px;min-height:60px}
.hat-card .h-name{font-size:12px;font-weight:700;margin-bottom:4px}
.hat-card .h-hint{font-size:10px;opacity:.7;margin-bottom:6px}
.hat-card textarea{width:100%;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:6px;color:#fff;font-size:11px;min-height:36px;resize:vertical}

/* FORCE */
.force-container{display:flex;gap:16px;margin-top:10px}
@media(max-width:600px){.force-container{flex-direction:column}}
.force-col{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px}
.force-col .fc-title{font-size:13px;font-weight:700;margin-bottom:8px}
.force-col.push .fc-title{color:var(--ac2)}.force-col.pull .fc-title{color:var(--gn)}

/* 5W2H */
.w5h2-grid{display:flex;flex-direction:column;gap:8px}
.w5h2-row{display:flex;gap:10px;align-items:flex-start}
.w5h2-key{width:64px;font-size:12px;font-weight:700;flex-shrink:0;padding-top:8px;display:flex;align-items:center;gap:6px}
.w5h2-key .wk-dot{width:8px;height:8px;border-radius:50%}
.w5h2-val{flex:1}
.w5h2-val textarea{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;color:var(--tx);font-size:13px;min-height:36px;resize:vertical}

/* PDCA */
.pdca-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.pdca-grid{grid-template-columns:1fr}}
.pdca-phase{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px}
.pdca-phase .pp-label{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.pdca-phase .pp-hint{font-size:11px;color:var(--mt);margin-bottom:8px}
.pdca-phase textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:6px;padding:8px;color:var(--tx);font-size:12px;min-height:50px;resize:vertical}

/* BELIEF */
.belief-item{background:rgba(245,197,66,.06);border:1px solid rgba(245,197,66,.15);border-radius:8px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.belief-item .bi-del{cursor:pointer;color:var(--mt)}.belief-item .bi-del:hover{color:var(--ac2)}

/* DIARY */
.diary-entry{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px}
.diary-entry .de-date{font-size:11px;color:var(--mt);margin-bottom:4px}
.diary-entry .de-text{font-size:13px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:12px}
.modal pre{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:14px;font-size:12px;white-space:pre-wrap;word-break:break-all;color:var(--mt);max-height:400px;overflow-y:auto}
.modal .modal-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}

/* STEP FOOTER */
.step-complete-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin-top:20px;border-top:1px solid var(--bd)}
.step-complete-bar .sc-info{font-size:13px;color:var(--mt)}
</style>
</head>
<body>

<div class="hdr">
  <h1>🧩 解决问题实操系统</h1>
  <div class="sub">KSME七步法 · 输入问题 → 用工具分析 → 落地行动 → 归档复盘</div>
</div>

<div class="app" id="app"></div>

<script>
// ===================== STATE =====================
const STORAGE_KEY = 'ksme_problems_v3';
let problems = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
// Data migration: ensure all problems have new fields
problems.forEach(p => {
  if (p.steps && p.steps[6]) {
    if (!p.steps[6].interferences) p.steps[6].interferences = [];
    if (!p.steps[6].relTools) p.steps[6].relTools = { appreciate: '', trust: '', listen: '' };
  }
});
let currentId = null;
let currentStep = 1;
let pipeStage = 1; // Step1 internal stage
let connFrom = -1; // connection builder: selected "from" index
let dashTab = 'practice'; // dashboard tab

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(problems)); }
function getProb(id) { return problems.find(p => p.id === id); }
function now() { return new Date().toISOString().slice(0, 16).replace('T', ' '); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function newProblem(title) {
  const p = {
    id: Date.now().toString(),
    title,
    status: 'active',
    createdAt: now(),
    updatedAt: now(),
    steps: {
      1: { items: [], kingIdx: -1, connections: [] },
      2: { stakeholders: [], emotionAccount: '' },
      3: { facts: [], opinions: [], mece: [] },
      4: { smartGoal: { s: '', m: '', a: '', r: '', t: '' }, 初心: '' },
      5: { currentStatus: '', targetStatus: '', gapDelta: '', pushForces: [], pullForces: [] },
      6: { ksme: { k: '', s: '', m: '', e: '' }, interferences: [], brainstorm: [], hats: { white: '', red: '', black: '', yellow: '', green: '', blue: '' }, relTools: { appreciate: '', trust: '', listen: '' } },
      7: { w5h2: { what: '', why: '', who: '', when: '', where: '', how: '', howMuch: '' }, pdca: { plan: '', do: '', check: '', act: '' } }
    },
    emotion: { goldenBeliefs: ['我遇到的是问题，我就是答案','情绪不是敌人，是信使','每个问题背后都藏着一个成长机会'], awesomeDiary: [] },
    completedSteps: []
  };
  problems.unshift(p);
  save();
  return p;
}

// ===================== RENDER =====================
const app = document.getElementById('app');
function render() { if (!currentId) renderDashboard(); else renderWorkspace(); }

// ---------- DASHBOARD ----------
function renderDashboard() {
  const active = problems.filter(p => p.status === 'active');
  const archived = problems.filter(p => p.status === 'archived');
  app.innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:24px">
      <button class="btn-sm btn-primary">🎯 实操解决问题</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h2 style="font-size:20px">我的问题</h2>
      <button class="btn-new" onclick="createNew()">+ 新建问题</button>
    </div>
    ${active.length === 0 ? `
      <div class="dash-empty"><div class="big">🎯</div><p>还没有正在解决的问题<br>点击下方按钮，开始你的第一个问题</p><button class="btn-new" onclick="createNew()">+ 新建问题</button></div>
    ` : `<div class="problem-list">${active.map(p => {
      const stepNames = ['','识别问题','梳理关系人','明确现状','明确目标','明确差距与代价','制定方案','行动计划'];
      const prog = p.completedSteps.length / 7 * 100;
      return `<div class="problem-card"><div class="info"><div class="title">${esc(p.title)}</div><div class="meta"><span>📅 ${p.updatedAt}</span><span>📍 ${stepNames[p.completedSteps.length+1]||'已全部完成'}</span><span>✅ ${p.completedSteps.length}/7</span></div><div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${prog}%"></div></div></div><div class="actions"><button class="btn-sm btn-primary" onclick="openProb('${p.id}')">继续</button><button class="btn-sm btn-outline" onclick="archiveProb('${p.id}')">归档</button><button class="btn-sm btn-danger" onclick="deleteProb('${p.id}')">删除</button></div></div>`;
    }).join('')}</div>`}
    ${archived.length > 0 ? `<div style="margin-top:36px"><h2 style="font-size:18px;margin-bottom:16px">📦 已归档 (${archived.length})</h2><div class="problem-list">${archived.map(p => `<div class="problem-card"><div class="info"><div class="title">${esc(p.title)}</div><div class="meta"><span>📅 ${p.updatedAt}</span><span>✅ ${p.completedSteps.length}/7</span></div></div><div class="actions"><button class="btn-sm btn-outline" onclick="openProb('${p.id}')">查看</button><button class="btn-sm btn-danger" onclick="deleteProb('${p.id}')">删除</button></div></div>`).join('')}</div></div>` : ''}
  `;
}

function createNew() { const t = prompt('请输入你要解决的问题：'); if (!t||!t.trim()) return; const p = newProblem(t.trim()); currentId = p.id; currentStep = 1; pipeStage = 1; render(); }
function openProb(id) { currentId = id; currentStep = 1; pipeStage = 1; render(); }
function archiveProb(id) { const p = getProb(id); if(p){p.status='archived';p.updatedAt=now();save();render();} }
function deleteProb(id) { if(!confirm('确认删除？所有数据将丢失。'))return; problems=problems.filter(p=>p.id!==id); save(); render(); }

// ---------- WORKSPACE ----------
function renderWorkspace() {
  const p = getProb(currentId);
  if (!p) { currentId = null; render(); return; }
  const prog = p.completedSteps.length / 7 * 100;
  const stepNames = ['','识别问题','梳理关系人','明确现状','明确目标','明确差距与代价','制定方案','行动计划'];
  app.innerHTML = `
    <div class="topbar">
      <div class="left"><button class="back-btn" onclick="currentId=null;render()">← 返回</button><div class="prob-title">${esc(p.title)}</div></div>
      <div class="right"><button class="btn-sm btn-outline" onclick="exportProb()">📄 导出</button>${p.status==='active'?`<button class="btn-sm btn-archived" onclick="archiveProb('${p.id}');currentId=null;render()">📦 归档</button>`:''}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div class="step-nav">${[1,2,3,4,5,6,7].map(i=>`<div class="step-tab ${currentStep===i?'active':''} ${p.completedSteps.includes(i)?'done':''}" onclick="goStep(${i})"><span class="num">${i}</span>${stepNames[i]}</div>`).join('')}<div class="step-tab ${currentStep===0?'active':''}" onclick="goStep(0)" style="color:var(--pk)">💛 情绪</div></div>
    <div id="stepContent"></div>
  `;
  renderStepContent();
}
function goStep(s) { currentStep = s; pipeStage = 1; render(); }

function stepDone(n) { const p=getProb(currentId); if(p&&!p.completedSteps.includes(n)){p.completedSteps.push(n);p.updatedAt=now();save();} }
function stepUndone(n) { const p=getProb(currentId); if(p){p.completedSteps=p.completedSteps.filter(s=>s!==n);p.updatedAt=now();save();} }
function toggleStepDone(n) { const p=getProb(currentId); if(p.completedSteps.includes(n)) stepUndone(n); else {saveCurrentFields(n); stepDone(n);} render(); }

function stepFooter(p, step, nextHint) {
  const done = p.completedSteps.includes(step);
  return `<div class="step-complete-bar"><div class="sc-info">${done?'✅ 本步已完成':'⬜ 填写完毕后标记完成'}</div><div style="display:flex;gap:8px">${step>1?`<button class="btn-sm btn-outline" onclick="goStep(${step-1})">← 上一步</button>`:''}<button class="btn-sm ${done?'btn-outline':'btn-primary'}" onclick="toggleStepDone(${step})">${done?'取消完成':'✓ 完成本步'}</button>${step<7?`<button class="btn-sm btn-primary" onclick="goStep(${step+1})">${nextHint} →</button>`:''}</div></div>`;
}

// ===================== STEP CONTENT =====================
function renderStepContent() {
  const p = getProb(currentId); if (!p) return;
  const c = document.getElementById('stepContent');
  const renderers = { 0: renderEmotion, 1: renderStep1, 2: renderStep2, 3: renderStep3, 4: renderStep4, 5: renderStep5, 6: renderStep6, 7: renderStep7 };
  c.innerHTML = (renderers[currentStep] || renderers[1])(p);
}

// ===================== STEP 1: INTEGRATED PIPELINE =====================
function renderStep1(p) {
  const s = p.steps[1];
  return `
    <div class="step-intro">
      <h3>📍 Step 1 · 识别问题</h3>
      <p><span class="why">为什么这一步？</span> 一切始于"你到底要解决什么"。大多数人不是没有答案，而是答错了问题。这一步的目的：从一团乱麻中<strong>锁定唯一的核心问题</strong>（"问题之王"）。</p>
      <p>下面的流水线把4个工具串成一条线——<strong>列问题 → 分象限 → 找因果 → 锁核心</strong>，数据自动流转，不用重复输入。</p>
    </div>

    <div class="pipeline">
      <div class="pipe-header"><h4>🔄 问题识别流水线</h4></div>
      <div class="pipe-stages">
        ${[
          [1,'📋 列出所有问题','把脑子里的困扰全倒出来'],
          [2,'🔲 四象限分类','按紧急/重要分到4个格子'],
          [3,'🔗 连线找因果','找出谁导致了谁'],
          [4,'👑 锁定核心问题','选出"问题之王"']
        ].map(([n,label,hint]) => `
          <div class="pipe-stage ${pipeStage===n?'active':''} ${s.items.length>0 && n<=Math.min(4, pipeStage)?'done':''}" onclick="pipeStage=${n};renderStepContent()" title="${hint}">
            <span class="ps-num">${n}</span>${label}
          </div>
        `).join('')}
      </div>
      <div class="pipe-body">
        ${pipeStage === 1 ? renderPipe1(p) : pipeStage === 2 ? renderPipe2(p) : pipeStage === 3 ? renderPipe3(p) : renderPipe4(p)}
      </div>
    </div>

    ${stepFooter(p, 1, '问题锁定了，接下来看涉及哪些人')}
  `;
}

// -- Pipe Stage 1: List --
function renderPipe1(p) {
  const s = p.steps[1];
  return `
    <div class="howto"><div class="ht-title">操作方法</div>
      <ol>
        <li><strong>限时5分钟</strong>，在下方输入框逐条写下所有困扰你的问题</li>
        <li><strong>不要评判</strong>——"这是不是真正的问题"稍后再说</li>
        <li><strong>尽量具体</strong>——"工作不顺"不如"连续3个月没完成KPI"</li>
        <li>一般能列出5-15个问题，写完点"下一步"进入分类</li>
      </ol>
    </div>
    <div class="pl-input-row">
      <input class="field-input" id="plInput" placeholder="输入一个问题，回车添加，例：连续加班2个月没有休息" onkeydown="if(event.key==='Enter')addPLItem()">
      <button class="btn-add" onclick="addPLItem()">添加</button>
    </div>
    <div class="pl-list" id="plList">
      ${s.items.map((item, i) => `
        <div class="pl-item">
          <span class="pl-text">${esc(item.text)}</span>
          <span class="pl-badge b-${item.quad || 'unclassified'}">${quadLabel(item.quad)}</span>
          <span class="pl-del" onclick="delPLItem(${i})">✕</span>
        </div>
      `).join('')}
    </div>
    ${s.items.length > 0 ? `<div class="pl-count">共 ${s.items.length} 个问题</div><div style="text-align:right;margin-top:12px"><button class="btn-sm btn-primary" onclick="pipeStage=2;renderStepContent()">进入四象限分类 →</button></div>` : '<div style="text-align:center;color:var(--mt);padding:20px">先把脑子里的问题都倒出来吧 👆</div>'}
  `;
}

function quadLabel(q) { return q==='q1'?'紧急重要':q==='q2'?'重要不紧急':q==='q3'?'紧急不重要':q==='q4'?'不紧急不重要':'未分类'; }

// -- Pipe Stage 2: Quadrant --
function renderPipe2(p) {
  const s = p.steps[1];
  const unclassified = s.items.map((it, i) => ({ ...it, idx: i })).filter(it => !it.quad);
  const byQuad = { q1: [], q2: [], q3: [], q4: [] };
  s.items.forEach((it, i) => { if (it.quad) byQuad[it.quad].push({ ...it, idx: i }); });

  const quadDefs = [
    { key: 'q1', label: '第一象限', sub: '紧急且重要 → 优先解决', cls: 'q1', color: 'var(--gn)' },
    { key: 'q2', label: '第二象限', sub: '重要不紧急 → 制定计划', cls: 'q2', color: 'var(--or)' },
    { key: 'q3', label: '第三象限', sub: '紧急不重要 → 委托他人', cls: 'q3', color: 'var(--bl)' },
    { key: 'q4', label: '第四象限', sub: '不紧急不重要 → 直接放弃', cls: 'q4', color: 'var(--mt)' }
  ];

  return `
    <div class="howto"><div class="ht-title">操作方法</div>
      <ol>
        <li>下方"未分类"区域是你上一步列出的所有问题</li>
        <li>点击每个问题右侧的<strong>箭头按钮</strong>，把它归入对应象限</li>
        <li>归入后还可以用箭头移到其他象限</li>
        <li>第四象限的问题可以考虑直接删除</li>
      </ol>
    </div>
    <div class="quad-grid">
      ${quadDefs.map(qd => `
        <div class="quad-cell ${qd.cls}">
          <div class="q-label" style="color:${qd.color}">${qd.label}</div>
          <div class="q-sub">${qd.sub}</div>
          ${byQuad[qd.key].map(it => `
            <div class="q-item ${s.kingIdx === it.idx ? 'king-item' : ''}">
              <span class="qi-text">${esc(it.text)}</span>
              ${quadDefs.filter(q => q.key !== qd.key).map(q => `<span class="qi-arr" onclick="moveQuad(${it.idx},'${q.key}')" title="移到${q.label}">→${q.label.slice(0,2)}</span>`).join('')}
              <span class="qi-del" onclick="moveQuad(${it.idx},'')">↩</span>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
    ${unclassified.length > 0 ? `
      <div class="unclassified-bank">
        <div class="ub-title">📥 待分类的问题 (${unclassified.length})</div>
        <div class="ub-hint">点击箭头归入对应象限</div>
        ${unclassified.map(it => `
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;background:rgba(136,146,164,.06);border-radius:6px;margin-bottom:4px">
            <span style="flex:1">${esc(it.text)}</span>
            <span style="cursor:pointer;color:var(--gn);font-size:10px" onclick="moveQuad(${it.idx},'q1')" title="紧急重要">Q1</span>
            <span style="cursor:pointer;color:var(--or);font-size:10px" onclick="moveQuad(${it.idx},'q2')" title="重要不紧急">Q2</span>
            <span style="cursor:pointer;color:var(--bl);font-size:10px" onclick="moveQuad(${it.idx},'q3')" title="紧急不重要">Q3</span>
            <span style="cursor:pointer;color:var(--mt);font-size:10px" onclick="moveQuad(${it.idx},'q4')" title="不紧急不重要">Q4</span>
          </div>
        `).join('')}
      </div>
    ` : ''}
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn-sm btn-outline" onclick="pipeStage=1;renderStepContent()">← 返回列表</button>
      <button class="btn-sm btn-primary" onclick="pipeStage=3;connFrom=-1;renderStepContent()">进入连线分析 →</button>
    </div>
  `;
}

// -- Pipe Stage 3: Connections --
function renderPipe3(p) {
  const s = p.steps[1];
  // Only show Q1 and Q2 items for connection analysis
  const candidates = s.items.map((it, i) => ({ ...it, idx: i })).filter(it => it.quad === 'q1' || it.quad === 'q2');
  // Count connections per item
  const connCount = {};
  s.connections.forEach(c => { connCount[c.from] = (connCount[c.from] || 0) + 1; connCount[c.to] = (connCount[c.to] || 0) + 1; });
  // Find max
  const maxConn = candidates.reduce((max, it) => Math.max(max, connCount[it.idx] || 0), 0);

  return `
    <div class="howto"><div class="ht-title">操作方法</div>
      <ol>
        <li>左侧是第一、二象限的问题（已从上一步自动带入）</li>
        <li>点击一个问题描述选为<strong>"原因"</strong>，再点另一个选为<strong>"结果"</strong>，自动生成一条连线</li>
        <li>连线最多的 = 被最多问题依赖的根因</li>
        <li>下方会实时统计每个问题的连线数</li>
      </ol>
    </div>
    <div class="conn-workspace">
      <div class="conn-problems">
        <div class="cp-title">问题列表（Q1 + Q2）</div>
        ${candidates.length === 0 ? '<div style="color:var(--mt);font-size:13px;padding:12px">请先在四象限中把问题归入Q1或Q2</div>' : candidates.map(it => `
          <div class="conn-item ${connFrom === it.idx ? 'selected' : ''}" onclick="selectConn(${it.idx})">
            <span class="ci-dot" style="background:${it.quad==='q1'?'var(--gn)':'var(--or)'}"></span>
            <span class="ci-text">${esc(it.text)}</span>
            ${connCount[it.idx] ? `<span class="ci-conn-count">${connCount[it.idx]}条连线</span>` : ''}
          </div>
        `).join('')}
      </div>
      <div class="conn-builder">
        <div class="cb-title">连线关系（A → B 表示 A导致B）</div>
        <div style="font-size:11px;color:var(--mt);margin-bottom:8px">${connFrom >= 0 ? '✅ 已选原因，请点击右侧选"结果"' : '👆 先点击左侧选"原因"'}</div>
        ${s.connections.map((c, ci) => `
          <div class="conn-link">
            <span class="cl-from">${esc(s.items[c.from].text)}</span>
            <span style="color:var(--ac)">→</span>
            <span class="cl-to">${esc(s.items[c.to].text)}</span>
            <span class="cl-del" onclick="delConn(${ci})">✕</span>
          </div>
        `).join('')}
        ${s.connections.length === 0 ? '<div style="color:var(--mt);font-size:12px;padding:8px">暂无连线，点击左侧两个问题建立因果</div>' : ''}
        ${s.connections.length > 0 ? `
          <div class="conn-stats">
            <div style="font-size:12px;font-weight:700;margin-bottom:6px">📊 连线热度统计</div>
            ${candidates.sort((a, b) => (connCount[b.idx]||0) - (connCount[a.idx]||0)).slice(0, 5).map(it => `
              <div class="cs-item"><span>${esc(it.text)}</span><span class="${(connCount[it.idx]||0)===maxConn && maxConn > 0 ? 'cs-hot' : ''}">${connCount[it.idx]||0} 条连线</span></div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn-sm btn-outline" onclick="pipeStage=2;renderStepContent()">← 返回象限</button>
      <button class="btn-sm btn-primary" onclick="pipeStage=4;renderStepContent()">锁定核心问题 →</button>
    </div>
  `;
}

// -- Pipe Stage 4: King --
function renderPipe4(p) {
  const s = p.steps[1];
  const candidates = s.items.map((it, i) => ({ ...it, idx: i })).filter(it => it.quad === 'q1' || it.quad === 'q2');
  const connCount = {};
  s.connections.forEach(c => { connCount[c.from] = (connCount[c.from]||0)+1; connCount[c.to] = (connCount[c.to]||0)+1; });
  const others = s.items.map((it, i) => ({ ...it, idx: i })).filter(it => it.quad && it.idx !== s.kingIdx);

  return `
    <div class="howto"><div class="ht-title">操作方法</div>
      <ol>
        <li>下方列出Q1/Q2象限的所有问题，附带连线数参考</li>
        <li><strong>点击一个问题</strong>将它设为"问题之王"——这就是你接下来集中攻克的核心</li>
        <li>标准：解决它之后，其他问题会显著缓解或消失</li>
        <li>核心问题下方的"待解决问题"列表——核心问题解决后，它们就是你的下一轮问题</li>
      </ol>
    </div>
    <div class="king-selection">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">点击选择你的"问题之王"：</div>
      <div class="king-candidates">
        ${candidates.map(it => `
          <div class="king-cand ${s.kingIdx === it.idx ? 'is-king' : ''}" onclick="setKing(${it.idx})">
            <span class="kc-icon">${s.kingIdx === it.idx ? '👑' : '◇'}</span>
            <span class="kc-text">${esc(it.text)}</span>
            ${connCount[it.idx] ? `<span class="kc-conn">${connCount[it.idx]}条连线</span>` : ''}
            ${s.kingIdx === it.idx ? '<span class="kc-tag">核心问题</span>' : ''}
          </div>
        `).join('')}
        ${candidates.length === 0 ? '<div style="color:var(--mt);font-size:13px;padding:12px">请先在前面的步骤中添加并分类问题</div>' : ''}
      </div>
    </div>
    ${s.kingIdx >= 0 ? `
      <div style="background:rgba(245,197,66,.06);border:1px solid rgba(245,197,66,.2);border-radius:10px;padding:16px;margin-bottom:16px">
        <div style="font-size:14px;font-weight:700;color:var(--gd);margin-bottom:4px">👑 你的核心问题</div>
        <div style="font-size:16px;font-weight:700">${esc(s.items[s.kingIdx].text)}</div>
        <div style="font-size:12px;color:var(--mt);margin-top:6px">接下来6个步骤都将围绕解决这个问题展开。解决它之后，下方的问题会自动变成你的下一轮"问题之王"候选。</div>
      </div>
    ` : ''}
    <div class="other-problems">
      <div class="op-title">📋 待解决问题（核心问题解决后的下一轮候选）</div>
      <div class="op-hint">核心问题解决后，这些问题会自动成为你的新问题。你也可以点击"立即攻克"把它升级为当前核心问题。</div>
      ${others.map(it => `
        <div class="op-item">
          <span style="font-size:10px;color:${it.quad==='q1'?'var(--gn)':it.quad==='q2'?'var(--or)':it.quad==='q3'?'var(--bl)':'var(--mt)'}">${quadLabel(it.quad)}</span>
          <span class="op-text">${esc(it.text)}</span>
          <span class="op-promote" onclick="promoteToKing(${it.idx})">👑 立即攻克</span>
        </div>
      `).join('')}
      ${others.length === 0 ? '<div style="color:var(--mt);font-size:12px;padding:8px">还没有其他问题</div>' : ''}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn-sm btn-outline" onclick="pipeStage=3;connFrom=-1;renderStepContent()">← 返回连线</button>
      <button class="btn-sm btn-outline" onclick="pipeStage=1;renderStepContent()">← 回到列表</button>
    </div>
  `;
}

// Step 1 operations
function addPLItem() {
  const inp = document.getElementById('plInput');
  if (!inp || !inp.value.trim()) return;
  const p = getProb(currentId);
  p.steps[1].items.push({ text: inp.value.trim(), quad: null });
  inp.value = ''; save(); renderStepContent();
}
function delPLItem(i) { const p=getProb(currentId); p.steps[1].items.splice(i,1); if(p.steps[1].kingIdx===i)p.steps[1].kingIdx=-1; else if(p.steps[1].kingIdx>i)p.steps[1].kingIdx--; p.steps[1].connections=p.steps[1].connections.filter(c=>c.from!==i&&c.to!==i).map(c=>({from:c.from>i?c.from-1:c.from,to:c.to>i?c.to-1:c.to})); save(); renderStepContent(); }
function moveQuad(idx, quad) {
  const p = getProb(currentId);
  p.steps[1].items[idx].quad = quad || null;
  if (!quad && p.steps[1].kingIdx === idx) p.steps[1].kingIdx = -1;
  save(); renderStepContent();
}
function selectConn(idx) {
  const p = getProb(currentId);
  if (connFrom < 0) { connFrom = idx; renderStepContent(); }
  else {
    if (connFrom !== idx) { p.steps[1].connections.push({ from: connFrom, to: idx }); }
    connFrom = -1; save(); renderStepContent();
  }
}
function delConn(ci) { const p=getProb(currentId); p.steps[1].connections.splice(ci,1); save(); renderStepContent(); }
function setKing(idx) { const p=getProb(currentId); p.steps[1].kingIdx = (p.steps[1].kingIdx === idx ? -1 : idx); save(); renderStepContent(); }
function promoteToKing(idx) { setKing(idx); }

      <div id="shList">${s.stakeholders.map((sh,i)=>`<div class="sh-card"><div class="sh-head"><div><span class="sh-name">${esc(sh.name)}</span> <span class="sh-role ${roles.find(r=>r[0]===sh.role)[3]}">${roles.find(r=>r[0]===sh.role)[1]}</span></div><span class="sh-del" onclick="delSH(${i})">删除</span></div><div style="font-size:12px;color:var(--mt);margin-top:4px">${esc(sh.note)}</div></div>`).join('')}</div>

function renderStep3(p) {

  return `

    <div class="tool"><div class="tool-hdr" onclick="toggleTool(this)"><div class="left"><span class="emoji">⚖️</span><span class="name">事实 vs 观点</span><span class="tag">核心工具</span></div><span class="toggle">▼</span></div><div class="tool-body">

        ✅ 5W2H写法：<strong>What</strong>完成Python数据分析课 | <strong>Why</strong>月收入目标+4000需要技术能力 | <strong>Who</strong>我自己+同事小王监督 | <strong>When</strong>6月30日前 | <strong>Where</strong>网易云课堂 | <strong>How</strong>每周二四晚8-10点学2小时 | <strong>How Much</strong>课程费299元+每周4小时
      </div>
      <div class="w5h2-grid">${[['what','What·做什么','var(--ac)',smartS?`💡 来自SMART-S：${esc(smartS)}`:'具体做什么事？不是"提升"，而是"完成XX"'],['why','Why·为什么','var(--gn)',smartT?`💡 来自SMART-T：${esc(smartT)}`:'连回目标——这个行动和目标的关系'],['who','Who·谁做','var(--bl)','谁负责？谁配合？（回顾Step2关系人）'],['when','When·何时','var(--or)','具体到日期："6月15日前"不是"尽快"'],['where','Where·在哪','var(--pk)','线上/线下？哪个平台/地点？'],['how','How·怎么做','var(--gd)',ksmeK||ksmeS?'💡 来自KSME方案':'执行步骤：第一步→第二步→...'],['howMuch','How Much·多少','var(--mt)','成本/时间/资源——花多少钱？占多少时间？']].map(([k,l,c,ph])=>`<div class="w5h2-row"><div class="w5h2-key"><span class="wk-dot" style="background:${c}"></span>${l.split('·')[0]}</div><div class="w5h2-val"><textarea data-w5h2="${k}" class="field-input" style="min-height:48px" placeholder="${ph}">${esc(s.w5h2[k])}</textarea></div></div>`).join('')}</div>
    </div></div>
    <div class="tool"><div class="tool-hdr" onclick="toggleTool(this)"><div class="left"><span class="emoji">🔄</span><span class="name">PDCA循环</span><span class="tag">持续改进</span></div><span class="toggle">▼</span></div><div class="tool-body">
      <div class="tool-desc">5W2H是一次性的计划，<strong>PDCA是持续迭代的引擎</strong>。行动计划不可能一次完美，必须在执行中不断调整。每轮PDCA是一个"计划→执行→检查→调整"的闭环。</div>
      <div class="howto"><div class="ht-title">4步循环，每轮1-2周</div><ol>
        <li><strong>Plan 计划</strong>：本周具体要做什么？达到什么指标？（从5W2H中拆出本周任务）</li>
        <li><strong>Do 执行</strong>：实际做了什么？如实记录，不美化</li>
        <li><strong>Check 检查</strong>：计划 vs 实际，达标了吗？差距在哪？为什么？（回到Step5的差距思维）</li>
        <li><strong>Act 调整</strong>：下一轮怎么改？是调整计划、换方法、还是重新评估目标？</li>
      </ol></div>
      <div style="background:rgba(245,197,66,.06);border:1px solid rgba(245,197,66,.2);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px;line-height:1.8">
        <strong style="color:#fde68a">💡 实战示例：</strong><br>
        <strong>Plan</strong>：本周完成Python课第1-3章，做2个练习<br>
        <strong>Do</strong>：只完成了第1-2章，练习做了1个<br>
        <strong>Check</strong>：未达标，原因是周三加班占用了学习时间<br>
        <strong>Act</strong>：下周改为"周三不安排学习任务"，把学习时间调到周末上午
      </div>
      <div class="pdca-grid">${[['plan','📝 Plan · 本周计划','从5W2H拆出本周任务，设定可达成的指标','rgba(108,99,255,.08)'],['do','🏃 Do · 执行记录','如实记录实际做了什么，不美化','rgba(79,195,247,.08)'],['check','🔍 Check · 检查对比','计划vs实际，达标了吗？差距在哪？','rgba(245,197,66,.08)'],['act','🔧 Act · 下轮调整','基于Check结果调整：改计划/换方法/重新评估','rgba(67,217,162,.08)']].map(([k,t,h,bg])=>`<div class="pdca-phase" style="background:${bg}"><div class="pp-label">${t}</div><div class="pp-hint">${h}</div><textarea data-pdca="${k}" class="field-input" style="min-height:70px" placeholder="${h}">${esc(s.pdca[k])}</textarea></div>`).join('')}</div>
    </div></div>
    ${stepFooter(p,7,'全部7步完成！🎉 可以导出完整记录了')}
  `;
}

// ===================== STEP 0: EMOTION =====================
function renderEmotion(p) {
  const e = p.emotion;
  return `
    <div class="step-intro"><h3>💛 情绪管理 —— 全程底座</h3><p>P = p - i（表现 = 潜能 - 干扰），情绪干扰是最大的"i"。情绪不处理，理性就无法上线。</p></div>
    <div class="tool"><div class="tool-hdr" onclick="toggleTool(this)"><div class="left"><span class="emoji">🪞</span><span class="name">情绪自检</span><span class="tag">随时用</span></div><span class="toggle">▼</span></div><div class="tool-body">
      <div class="howto"><div class="ht-title">3个问题</div><ol><li><strong>我现在什么感受？</strong>用1个词命名</li><li><strong>这个情绪想告诉我什么？</strong></li><li><strong>我此刻能做什么？</strong></li></ol></div>
      <div class="field-group"><textarea class="field-input" id="emoCheck" placeholder="例：我现在很焦虑，因为不知道从哪开始…">${e.emotionCheck||''}</textarea></div>
    </div></div>
    <div class="tool"><div class="tool-hdr" onclick="toggleTool(this)"><div class="left"><span class="emoji">⭐</span><span class="name">金色信念</span><span class="tag">对抗消极</span></div><span class="toggle">▼</span></div><div class="tool-body">
      <div class="tool-desc">消极念头出现时，用金色信念替换。</div>
      <div id="beliefsList">${e.goldenBeliefs.map((b,i)=>`<div class="belief-item"><span>✨ ${esc(b)}</span><span class="bi-del" onclick="delBelief(${i})">✕</span></div>`).join('')}</div>
      <div class="field-row" style="margin-top:8px"><input class="field-input" id="beliefInput" placeholder="添加金色信念" onkeydown="if(event.key==='Enter')addBelief()"><button class="btn-add" onclick="addBelief()">添加</button></div>
    </div></div>
    <div class="tool"><div class="tool-hdr" onclick="toggleTool(this)"><div class="left"><span class="emoji">📝</span><span class="name">棒呆了日记</span><span class="tag">每日练习</span></div><span class="toggle">▼</span></div><div class="tool-body">
      <div class="tool-desc">每天3件好事，21天重塑思维惯性。</div>
      <div id="diaryList">${e.awesomeDiary.map(d=>`<div class="diary-entry"><div class="de-date">${esc(d.date)}</div><div class="de-text">${esc(d.text)}</div></div>`).join('')}</div>
      <div class="field-group" style="margin-top:10px"><textarea class="field-input" id="diaryInput" placeholder="今天3件棒呆了的事"></textarea><button class="btn-add" style="margin-top:8px" onclick="addDiary()">记录今天</button></div>
    </div></div>
  `;
}
function addBelief(){const i=document.getElementById('beliefInput');if(!i||!i.value.trim())return;const p=getProb(currentId);p.emotion.goldenBeliefs.push(i.value.trim());i.value='';save();renderStepContent();}
function delBelief(i){const p=getProb(currentId);p.emotion.goldenBeliefs.splice(i,1);save();renderStepContent();}
function addDiary(){const i=document.getElementById('diaryInput');if(!i||!i.value.trim())return;const p=getProb(currentId);p.emotion.awesomeDiary.unshift({date:now(),text:i.value.trim()});i.value='';save();renderStepContent();}

// ===================== TOOL TOGGLE =====================
function toggleTool(hdr) { hdr.closest('.tool').classList.toggle('collapsed'); }

// ===================== SAVE FIELDS =====================
function saveCurrentFields(step) {
  const p = getProb(currentId); if (!p) return;
  if (step === 2) { const ea = document.getElementById('emoAccount'); if (ea) p.steps[2].emotionAccount = ea.value; }
  if (step === 4) { document.querySelectorAll('[data-smart]').forEach(el => { p.steps[4].smartGoal[el.dataset.smart] = el.value; }); const cx = document.getElementById('初心'); if (cx) p.steps[4].初心 = cx.value; }
  if (step === 5) { const cs = document.getElementById('curStatus'); if (cs) p.steps[5].currentStatus = cs.value; const ts = document.getElementById('tgtStatus'); if (ts) p.steps[5].targetStatus = ts.value; const gd = document.getElementById('gapDelta'); if (gd) p.steps[5].gapDelta = gd.value; }
  if (step === 6) { document.querySelectorAll('[data-ksme]').forEach(el => { p.steps[6].ksme[el.dataset.ksme] = el.value; }); document.querySelectorAll('[data-hat]').forEach(el => { p.steps[6].hats[el.dataset.hat] = el.value; }); document.querySelectorAll('[data-rel]').forEach(el => { if(!p.steps[6].relTools) p.steps[6].relTools={}; p.steps[6].relTools[el.dataset.rel] = el.value; }); }
  if (step === 7) { document.querySelectorAll('[data-w5h2]').forEach(el => { p.steps[7].w5h2[el.dataset.w5h2] = el.value; }); document.querySelectorAll('[data-pdca]').forEach(el => { p.steps[7].pdca[el.dataset.pdca] = el.value; }); }
  p.updatedAt = now(); save();
}

// Auto-save
let saveTimer = null;
document.addEventListener('input', () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const p = getProb(currentId); if (!p) return;
    const ea = document.getElementById('emoAccount'); if (ea) p.steps[2].emotionAccount = ea.value;
    const ec = document.getElementById('emoCheck'); if (ec) p.emotion.emotionCheck = ec.value;
    document.querySelectorAll('[data-smart]').forEach(el => { p.steps[4].smartGoal[el.dataset.smart] = el.value; });
    const cx = document.getElementById('初心'); if (cx) p.steps[4].初心 = cx.value;
    const cs = document.getElementById('curStatus'); if (cs) p.steps[5].currentStatus = cs.value;
    const ts = document.getElementById('tgtStatus'); if (ts) p.steps[5].targetStatus = ts.value;
    const gd = document.getElementById('gapDelta'); if (gd) p.steps[5].gapDelta = gd.value;
    document.querySelectorAll('[data-ksme]').forEach(el => { p.steps[6].ksme[el.dataset.ksme] = el.value; });
    document.querySelectorAll('[data-hat]').forEach(el => { p.steps[6].hats[el.dataset.hat] = el.value; });
    document.querySelectorAll('[data-rel]').forEach(el => { if(!p.steps[6].relTools) p.steps[6].relTools={}; p.steps[6].relTools[el.dataset.rel] = el.value; });
    document.querySelectorAll('[data-w5h2]').forEach(el => { p.steps[7].w5h2[el.dataset.w5h2] = el.value; });
    document.querySelectorAll('[data-pdca]').forEach(el => { p.steps[7].pdca[el.dataset.pdca] = el.value; });
    p.updatedAt = now(); save();
  }, 1500);
});

// Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const map = { plInput: addPLItem, factInput: addFact, opinionInput: addOpinion, pushInput: addPush, pullInput: addPull, bsInput: addBS, beliefInput: addBelief };
  if (map[e.target.id]) { e.preventDefault(); map[e.target.id](); }
});

// ===================== EXPORT =====================
function exportProb() {
  const p = getProb(currentId); if (!p) return;
  saveCurrentFields(currentStep);
  const stepNames = ['','识别问题','梳理关系人','明确现状','明确目标','明确差距与代价','制定方案','行动计划'];
  let txt = `=== 解决问题实操记录 ===\n问题：${p.title}\n状态：${p.status==='active'?'进行中':'已归档'}\n完成步骤：${p.completedSteps.map(s=>stepNames[s]).join('→')||'无'}\n创建：${p.createdAt} | 更新：${p.updatedAt}\n\n`;
  const s1 = p.steps[1];
  txt += `--- Step 1 识别问题 ---\n`;
  s1.items.forEach((it,i) => { txt += `  ${s1.kingIdx===i?'👑':''}${quadLabel(it.quad)} | ${it.text}\n`; });
  txt += `连线关系：\n`;
  s1.connections.forEach(c => { txt += `  ${s1.items[c.from]?.text} → ${s1.items[c.to]?.text}\n`; });
  txt += `👑 核心问题：${s1.kingIdx>=0?s1.items[s1.kingIdx].text:'未选择'}\n\n`;
  txt += `--- Step 2 梳理关系人 ---\n`; p.steps[2].stakeholders.forEach(sh => { txt += `${sh.name}(${sh.role})：${sh.note}\n`; }); txt += `情感账户：${p.steps[2].emotionAccount||'未填'}\n\n`;
  txt += `--- Step 3 明确现状 ---\n事实：${p.steps[3].facts.join('；')||'未填'}\n观点→转化：${p.steps[3].opinions.join('；')||'未填'}\n`; p.steps[3].mece.forEach(b => { txt += `MECE·${b.name}：${b.items.join('；')||'空'}\n`; });
  txt += `\n--- Step 4 明确目标 ---\n`; ['s','m','a','r','t'].forEach(k => { txt += `${k.toUpperCase()}：${p.steps[4].smartGoal[k]||'未填'}\n`; }); txt += `初心：${p.steps[4].初心||'未填'}\n\n`;
  txt += `--- Step 5 差距与代价 ---\n现状：${p.steps[5].currentStatus||'未填'}\n目标：${p.steps[5].targetStatus||'未填'}\n差距：${p.steps[5].gapDelta||'未填'}\n推力：${p.steps[5].pushForces.join('；')||'未填'}\n拉力：${p.steps[5].pullForces.join('；')||'未填'}\n\n`;
  txt += `--- Step 6 制定方案 ---\n排除干扰：${(p.steps[6].interferences||[]).join('；')||'未填'}\n`; ['k','s','m','e'].forEach(k => { txt += `${k.toUpperCase()}：${p.steps[6].ksme[k]||'未填'}\n`; }); txt += `头脑风暴：${p.steps[6].brainstorm.join('；')||'未填'}\n`; ['white','red','black','yellow','green','blue'].forEach(k => { txt += `${k}帽：${p.steps[6].hats[k]||'未填'}\n`; }); const rt=p.steps[6].relTools||{}; txt += `欣赏：${rt.appreciate||'未填'}\n信任：${rt.trust||'未填'}\n倾听：${rt.listen||'未填'}\n`;
  txt += `\n--- Step 7 行动计划 ---\n`; ['what','why','who','when','where','how','howMuch'].forEach(k => { txt += `${k}：${p.steps[7].w5h2[k]||'未填'}\n`; }); ['plan','do','check','act'].forEach(k => { txt += `${k}：${p.steps[7].pdca[k]||'未填'}\n`; });
  txt += `\n--- 情绪管理 ---\n金色信念：${p.emotion.goldenBeliefs.join('；')}\n`; p.emotion.awesomeDiary.forEach(d => { txt += `[${d.date}] ${d.text}\n`; });
  const overlay = document.createElement('div'); overlay.className = 'modal-overlay'; overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal"><h3>📄 导出记录</h3><pre>${esc(txt)}</pre><div class="modal-btns"><button class="btn-sm btn-outline" onclick="this.closest('.modal-overlay').remove()">关闭</button><button class="btn-sm btn-primary" onclick="copyExport(this)">复制到剪贴板</button></div></div>`;
  document.body.appendChild(overlay); overlay.dataset.text = txt;
}
function copyExport(btn) { const t = btn.closest('.modal-overlay').dataset.text; navigator.clipboard.writeText(t).then(() => { btn.textContent='已复制 ✓'; setTimeout(()=>{btn.textContent='复制到剪贴板';},2000); }); }

// ===================== INIT =====================
render();
</script>
</body>
</html>
